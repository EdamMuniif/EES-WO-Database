// ── Date helpers ──────────────────────────────────────────────────
function formatForInput(val) {
    if(!val || String(val).trim()===""||String(val).trim()==="-") return "";
    let s=String(val).trim(), y,m,d;
    try {
        if(s.includes('/')) { let p=s.split('/'); if(p.length===3){d=+p[0];m=+p[1];y=+p[2];if(m>12&&d<=12){let t=d;d=m;m=t;}if(y<100)y+=2000;} }
        else if(s.includes('-')) { let p=s.split('-'); if(p.length===3){if(p[0].length===4){y=+p[0];m=+p[1];d=+p[2];}else{d=+p[0];y=+p[2];if(y<100)y+=2000;const mn=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];m=mn.findIndex(x=>p[1].toUpperCase().includes(x))+1;if(m===0)m=+p[1];}}}
        else if(!isNaN(parseFloat(s))&&parseFloat(s)>20000){let o=new Date(Math.round((parseFloat(s)-25569)*86400*1000));y=o.getUTCFullYear();m=o.getUTCMonth()+1;d=o.getUTCDate();}
        else{let o=new Date(s);if(!isNaN(o.getTime())){y=o.getFullYear();m=o.getMonth()+1;d=o.getDate();}}
        if(y&&m&&d&&y>=2000&&y<=2100) return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    } catch(e) {}
    return "";
}

function formatDateNice(ds) {
    if(!ds||ds.includes("1970")||ds.includes("1899")) return "-";
    const p=ds.split('-'); if(p.length!==3) return ds;
    const y=+p[0],mo=+p[1]-1,d=+p[2]; if(y<2000) return "-";
    const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const sx=["th","st","nd","rd"][(d%10>3||Math.floor(d%100/10)===1)?0:d%10];
    return `${d}${sx} ${mn[mo]} ${y}`;
}

// Save a single work order + its tasks to Firebase
async function dbSaveWO(wo) {
    const woData = {
        id: wo.id, asset: wo.asset, date: wo.date, sr: wo.sr||"",
        svo: wo.svo||"", priority: wo.priority,
        overallProgress: wo.overallProgress,
        assignees: wo.assignees||[],
        tasks: wo.tasks||[]
    };
    await db.ref(`ees_wo/${wo.id}`).set(woData);
}

    const updates = {};
    changedWOs.forEach(wo => {
        updates[`ees_wo/${wo.id}`] = {
            id: wo.id, asset: wo.asset, date: wo.date, sr: wo.sr||"",
            svo: wo.svo||"", priority: wo.priority,
            overallProgress: wo.overallProgress,
            assignees: wo.assignees||[],
            tasks: wo.tasks||[]
        };
    });
    await db.ref().update(updates);
}

// Save leave for one worker
async function dbSaveLeave(rc, data) {
    if(!data || data.type==='None') {
        await db.ref(`ees_leaves/${rc}`).remove();
    } else {
        await db.ref(`ees_leaves/${rc}`).set({ type: data.type, from: data.from||"", to: data.to||"" });
    }
}

// Save last import timestamp
async function dbSaveLastUpdate(ts) {
    await db.ref('ees_meta/lastUpdate').set(ts);
}

// Load all data from Firebase once
async function dbLoadAll() {
    const [woSnap, leavesSnap, metaSnap] = await Promise.all([
        db.ref('ees_wo').once('value'),
        db.ref('ees_leaves').once('value'),
        db.ref('ees_meta').once('value')
    ]);

    const woData = woSnap.val() || {};
    orders = Object.values(woData).map(wo => ({
        id: wo.id||"",
        asset: wo.asset||"",
        date: wo.date||"",
        sr: wo.sr||"",
        svo: wo.svo||"",
        priority: wo.priority||"Minor",
        overallProgress: wo.overallProgress||0,
        assignees: Array.isArray(wo.assignees) ? wo.assignees : [],
        tasks: Array.isArray(wo.tasks) ? wo.tasks : []
    }));

    const lvData = leavesSnap.val() || {};
    workerLeaves = {};
    Object.entries(lvData).forEach(([rc, lv]) => {
        if(lv && lv.type && lv.type !== 'None') workerLeaves[rc] = lv;
    });

    const meta = metaSnap.val() || {};
    lastUpdate = meta.lastUpdate || "Never";
}

// ── Real-time listener: auto-refresh when any device changes data ──
function startRealtimeSync() {
    stopRealtimeSync();

    const woRef = db.ref('ees_wo');
    const handler = woRef.on('value', snap => {
        if(!loggedIn) return;
        const data = snap.val() || {};
        orders = Object.values(data).map(wo => ({
            id: wo.id||"", asset: wo.asset||"", date: wo.date||"",
            sr: wo.sr||"", svo: wo.svo||"",
            priority: wo.priority||"Minor",
            overallProgress: wo.overallProgress||0,
            assignees: Array.isArray(wo.assignees) ? wo.assignees : [],
            tasks: Array.isArray(wo.tasks) ? wo.tasks : []
        }));
        renderApp();
    });
    realtimeListeners.push({ ref: woRef, handler });

    const lvRef = db.ref('ees_leaves');
    const lvHandler = lvRef.on('value', snap => {
        if(!loggedIn) return;
        const data = snap.val() || {};
        workerLeaves = {};
        Object.entries(data).forEach(([rc, lv]) => {
            if(lv && lv.type && lv.type !== 'None') workerLeaves[rc] = lv;
        });
        renderApp();
    });
    realtimeListeners.push({ ref: lvRef, handler: lvHandler });
}

function stopRealtimeSync() {
    realtimeListeners.forEach(({ ref, handler }) => ref.off('value', handler));
    realtimeListeners = [];
}

    if(!email||!pass) { loginErr="Please enter email and password."; renderApp(); return; }

    showLoad("Signing in...");

        currentUser = profile;
        loggedIn = true;
        loginErr = "";
        view = "dashboard";

        showLoad("Loading data...");
        await dbLoadAll();
        hideLoad();
        renderApp();
        startRealtimeSync();

        // Update online presence
        db.ref(`ees_presence/${currentUser.rc}`).set(Date.now());
        db.ref(`ees_presence/${currentUser.rc}`).onDisconnect().set(0);

    } catch(e) {
        hideLoad();
        if(e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
            loginErr = "Wrong email or password.";

        }
        renderApp();
    }
};

window.processExcel = async function(file) {
    if(!window.XLSX){showToast("⏳ Library loading...");return;}
    const reader=new FileReader();
    reader.onload=async(e)=>{
        showLoad("Reading Excel file...");
        try {
            const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
            const ws=wb.Sheets[wb.SheetNames[0]];
            let rows=XLSX.utils.sheet_to_json(ws,{defval:""});
            if(rows.length>0&&!("WO NUMBER" in rows[0])&&!("WO ID" in rows[0]))
                rows=XLSX.utils.sheet_to_json(ws,{range:4,defval:""});
            if(!rows.length){hideLoad();showToast("⚠️ No data found.");return;}

            const hd=Object.keys(rows[0]||{});
            const sk  = hd.find(k=>k.trim().toUpperCase().includes('START DATE'))    || "START DATE";
            const pk  = hd.find(k=>k.trim().toUpperCase().includes('PROGRESS'))      || " PROGRESS\n%";
            const stk = hd.find(k=>k.trim().toUpperCase()==='STATUS')                || "STATUS";
            const ck  = hd.find(k=>k.trim().toUpperCase()==='COMPLETED DATE')        || "COMPLETED DATE";
            const rk  = hd.find(k=>k.trim().toUpperCase().includes('REMARKS'))       || "WORKSHOPS REMARKS";
            const dk  = hd.find(k=>k.trim().toUpperCase().includes('CAPTAL')||k.trim().toUpperCase()==='TASK DETAILS') || "TASK DETAILS";

            const eew = rows.filter(r=>String(r["UNIT"]||"").trim().toUpperCase()==="EEW"||String(r["WO NUMBER"]||"").trim().toUpperCase().includes("-EEW"));
            if(!eew.length){hideLoad();showToast("⚠️ No EEW records found.");return;}

            let added=0, updated=0;
            const changed=new Map();

            eew.forEach(r=>{
                const wid=String(r["WO NUMBER"]||r["WO ID"]).trim();
                if(!wid||wid==="0")return;
                const ed=formatForInput(r["TASK DATE"])||formatForInput(r[sk])||"";
                let wo=orders.find(o=>o.id===wid);
                if(!wo){wo={id:wid,sr:String(r["SR NUMBER"]||"").trim(),svo:String(r["SVO NUMBER"]||"").trim(),asset:String(r["ASSET/SERVICE NAME"]||"TBA").trim(),date:ed,priority:"Minor",overallProgress:0,assignees:[],tasks:[]};orders.push(wo);}
                else if(isBadDate(wo.date)&&ed)wo.date=ed;

                const tn=String(r["TASK NO:"]||`Task-${wo.tasks.length+1}`).trim();
                const es=formatForInput(r[sk]),ee=formatForInput(r[ck]);
                const edet=String(r[dk]||r["TASK DETAILS"]||"").trim();
                const er=String(r[rk]||"").trim();

                let pv=r[pk],pn=0;
                if(typeof pv==='number')pn=pv;else if(typeof pv==='string')pn=parseFloat(pv.replace("%",""))||0;
                if(pn>0&&pn<=1)pn*=100;
                pn=Math.round(Math.min(100,Math.max(0,pn)));

                let rawSt=String(r[stk]||"Pending").trim().toLowerCase(), st="Pending";
                if(rawSt.includes("hold")||rawSt.includes("material")||rawSt.includes("delay"))st="Onhold";
                else if(rawSt.includes("ongo")||rawSt.includes("on-go")||rawSt.includes("progress"))st="Ongoing";
                else if(rawSt.includes("comp"))st="Completed";
                else if(rawSt.includes("canc"))st="Cancelled";

                const tx=wo.tasks.find(t=>t.taskNo===tn);
                if(!tx){wo.tasks.push({taskNo:tn,details:edet,status:st,startDate:es,progress:pn,completeDate:ee,remarks:er});added++;changed.set(wo.id,wo);}
                else{let c=false;if(es&&(isBadDate(tx.startDate)||tx.startDate!==es)){tx.startDate=es;c=true;}if(ee&&(isBadDate(tx.completeDate)||tx.completeDate!==ee)){tx.completeDate=ee;c=true;}if(edet&&tx.details!==edet){tx.details=edet;c=true;}if(r[stk]&&tx.status!==st){tx.status=st;c=true;}if(r[pk]!==undefined&&r[pk]!==""&&tx.progress!==pn){tx.progress=pn;c=true;}if(er&&tx.remarks!==er){tx.remarks=er;c=true;}if(c){updated++;changed.set(wo.id,wo);}}
            });

            changed.forEach(wo=>{if(wo.tasks.length){let tp=0;wo.tasks.forEach(t=>tp+=t.progress);wo.overallProgress=Math.round(tp/wo.tasks.length);}});

            if(changed.size>0){
                showLoad(`Saving ${changed.size} work orders to Firebase...`);
                await dbBatchSave([...changed.values()]);
                lastUpdate=new Date().toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"});
                await dbSaveLastUpdate(lastUpdate);
                showToast(`✅ Added ${added} new tasks, updated ${updated} existing`);
                setView('orders');
            } else {
                showToast("⚠️ No changes — database already up to date.");
            }
        } catch(err) {
            console.error(err);
            showToast("❌ Error: "+err.message, true);
        }
        hideLoad(); renderApp();
    };
    reader.readAsArrayBuffer(file);
};

        onlineHtml=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span style="color:var(--text);font-weight:600;">Ahmed Miushaan</span><span id="viewer-status"><span style="color:var(--red);font-weight:600;">🔴 Offline</span></span></div>`;
    }
    return `
    <aside class="sidebar ${isSidebarOpen?'show':''}">
        <div class="logo">
            <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px;line-height:1.2;margin-top:10px;margin-bottom:5px;">EES WO CONTROL<br>DATABASE</div>
        </div>
        <div class="nav-grp"><div class="nav-grp-lbl">Main</div>
            <div class="nav-item ${view==='dashboard'?'active':''}" onclick="setView('dashboard')"><span>📊</span> Dashboard</div>
            <div class="nav-item ${view==='orders'?'active':''}" onclick="setView('orders')"><span>📋</span> Active Orders</div>
            <div class="nav-item ${view==='completed'?'active':''}" onclick="setView('completed')"><span>✅</span> WO Completed</div>
        </div>
        <div class="nav-grp"><div class="nav-grp-lbl">Team</div>
            <div class="nav-item ${view==='workers'?'active':''}" onclick="setView('workers')"><span>👷</span> EES Team</div>
        </div>
        <div class="nav-grp"><div class="nav-grp-lbl">Reports & Data</div>
            ${!iv?`<div class="nav-item ${view==='upload'?'active':''}" onclick="setView('upload')"><span>⬆️</span> Manage Data</div>`:''}
            <div class="nav-item" onclick="exportExcel()"><span>⬇️</span> Export Excel</div>
        </div>
        <div class="sidebar-foot">
            ${onlineHtml}
            <div class="user-card">
                <div class="avc">${ini(currentUser.name)}</div>
                <div><div class="user-name">${currentUser.name}</div><div class="user-role">${currentUser.designation}</div></div>
            </div>
            <div class="theme-row">
                <span style="font-size:12px;color:var(--muted);font-weight:600;">Light Mode</span>
                <label class="switch"><input type="checkbox" onchange="toggleTheme()" ${isLightMode?'checked':''}><span class="slider"></span></label>
            </div>
            <div class="logout-text" onclick="handleLogout()">Logout</div>
        </div>
    </aside>`;
}

// ── Main render ───────────────────────────────────────────────────

function renderApp() {
    const root = document.getElementById("app-root");

    if(!loggedIn) {
        root.innerHTML=`<div class="login-wrap"><div class="login-card">
            <div class="login-title">EES WO CONTROL DATABASE</div>
            <div class="login-subtitle">MTCC</div>
            <div class="login-inp-group">
                <label class="login-lbl">Email / Username</label>
                <input id="login-u" class="login-inp" type="text" placeholder="Enter username or email" onkeydown="if(event.key==='Enter')handleLogin()">
                <label class="login-lbl">Password</label>
                <div class="pwd-container">
                    <input id="login-p" class="login-inp" type="password" placeholder="Enter password" style="padding-right:40px" onkeydown="if(event.key==='Enter')handleLogin()">
                    <div class="pwd-toggle" onclick="togglePassword()">
                        <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" stroke="var(--muted)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </div>
                </div>
                ${loginErr?`<div class="login-err">⚠ ${loginErr}</div>`:''}
            </div>
            <button class="login-btn" onclick="handleLogin()">Sign In →</button>
        </div></div>`;
        return;
    }

    // Update presence ping
    if(currentUser) db.ref(`ees_presence/${currentUser.rc}`).set(Date.now());

    const isViewer = currentUser?.role==='viewer';
    const dis = isViewer?'disabled':'';
    let contentHtml="", detailHtml="", topbarExtra="";

    // ── Dashboard ──
    if(view==="dashboard") {
        let onLeave=0; WORKERS.forEach(w=>{if(workerLeaves[w.rc]?.type&&workerLeaves[w.rc].type!=='None')onLeave++;});
        const uc=orders.filter(o=>(o.priority==="Urgent"||o.priority==="Critical")&&o.overallProgress<100);
        const og=orders.filter(o=>o.tasks.some(t=>t.status==="Ongoing")&&o.overallProgress<100);
        let tT=0,tOn=0,tOh=0,tP=0,tC=0,tCn=0;
        orders.forEach(o=>o.tasks.forEach(t=>{tT++;if(t.status==="Ongoing")tOn++;if(t.status==="Onhold")tOh++;if(t.status==="Pending")tP++;if(t.status==="Completed")tC++;if(t.status==="Cancelled")tCn++;}));
        topbarExtra=`<button class="btn" style="background:var(--red);color:#fff;font-weight:700;" onclick="exportDashboardPDF()">📄 REPORT</button>`;
        contentHtml=`
        <div id="dashboard-content" style="display:flex;flex-direction:column;gap:30px;padding-bottom:20px;">
            <div><div class="sec-title">EES MANPOWER</div><div class="task-stats">
                <div class="ts-item"><div class="ts-val">${WORKERS.length}</div><div class="ts-lbl">Headcount</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--blue)">${WORKERS.length-onLeave}</div><div class="ts-lbl">On Duty</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--red)">${onLeave}</div><div class="ts-lbl">On Leave</div></div>
            </div></div>
            <div><div class="sec-title">Tasks Status</div><div class="task-stats">
                <div class="ts-item"><div class="ts-val">${tT}</div><div class="ts-lbl">Total</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--blue)">${tOn}</div><div class="ts-lbl">Ongoing</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--orange)">${tOh}</div><div class="ts-lbl">Onhold</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--muted)">${tP}</div><div class="ts-lbl">Pending</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--green)">${tC}</div><div class="ts-lbl">Completed</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--red)">${tCn}</div><div class="ts-lbl">Cancelled</div></div>
            </div></div>
            <div><div class="sec-title" style="color:var(--red);">🚨 Urgent & Critical Active WOs</div><div class="wo-list">
                ${uc.length===0?`<div style="padding:18px;color:var(--muted);background:var(--card);border-radius:8px;">No Urgent/Critical items.</div>`:''}
                ${uc.map(o=>`<div class="wo-card" style="border-left-color:${PRI_CFG[o.priority].color}" onclick="selectOrder('${o.id}');setView('orders')"><div class="wo-col left"><div class="wo-id">${o.id}</div><div class="wo-asset">${o.asset}</div></div><div class="wo-col center"><div class="wo-date">${formatDateNice(o.date)}</div><div class="wo-tasks">${o.tasks.length} Tasks</div></div><div class="wo-col right">${PTagHTML(o.priority)}<div class="wo-prog">Prog: ${o.overallProgress}%</div></div></div>`).join('')}
            </div></div>
            <div><div class="sec-title" style="color:var(--green);">🟢 Ongoing Active WOs</div><div class="wo-list">
                ${og.length===0?`<div style="padding:18px;color:var(--muted);background:var(--card);border-radius:8px;">No Ongoing items.</div>`:''}
                ${og.map(o=>`<div class="wo-card ongoing-glow" onclick="selectOrder('${o.id}');setView('orders')"><div class="wo-col left"><div class="wo-id">${o.id}</div><div class="wo-asset">${o.asset}</div></div><div class="wo-col center"><div class="wo-date">${formatDateNice(o.date)}</div><div class="wo-tasks">${o.tasks.length} Tasks</div></div><div class="wo-col right">${PTagHTML(o.priority)}<div class="wo-prog">Prog: ${o.overallProgress}%</div></div></div>`).join('')}
            </div></div>
        </div>`;
    }

    // ── Orders / Completed ──
    else if(view==="orders"||view==="completed") {
        const isc=(view==="completed");
        const base=orders.filter(o=>isc?o.overallProgress===100:o.overallProgress<100);
        const assets=Array.from(new Set(base.map(o=>o.asset))).filter(Boolean).sort();
        const fil=base.filter(o=>filterAsset==="All"||o.asset===filterAsset);
        contentHtml=`
        <div style="margin-bottom:20px;"><label style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:block;font-weight:600;">Filter by Asset</label>
        <select class="filter-dropdown" onchange="setFilter(this.value)"><option value="All" ${filterAsset==="All"?"selected":""}>All Assets</option>${assets.map(a=>`<option value="${a}" ${filterAsset===a?"selected":""}>${a}</option>`).join('')}</select></div>
        <div class="wo-list">${fil.length===0?`<div style="text-align:center;color:var(--muted);padding:40px;">No ${isc?'completed':'active'} work orders.</div>`:''}
        ${fil.map(o=>{const on=o.tasks.some(t=>t.status==="Ongoing");return`<div class="wo-card ${on&&!isc?'ongoing-glow':''}" style="${!on||isc?`border-left-color:${PRI_CFG[o.priority].color}`:''}" onclick="selectOrder('${o.id}')"><div class="wo-col left"><div class="wo-id">${o.id}</div><div class="wo-asset">${o.asset}</div></div><div class="wo-col center"><div class="wo-date">${formatDateNice(o.date)}</div><div class="wo-tasks">${o.tasks.length} Tasks</div></div><div class="wo-col right">${PTagHTML(o.priority)}<div class="wo-prog" style="${isc?'color:var(--green)':''}">${o.overallProgress}%</div></div></div>`;}).join('')}</div>`;
    }

    // ── Workers ──
    else if(view==="workers") {
        contentHtml=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;">`+
        WORKERS.map(w=>{
            const wos=orders.filter(o=>o.assignees?.includes(w.rc));
            const act=wos.filter(o=>o.tasks.some(t=>t.status==="Ongoing")).length;
            const lv=workerLeaves[w.rc];
            const lvB=lv&&lv.type!=='None'?`<div style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;margin-top:8px;display:inline-block;">🔴 ${lv.type}${lv.from&&lv.to?` (${formatDateNice(lv.from)} – ${formatDateNice(lv.to)})`:''}</div>`:'';
            const md=isViewer?'':`<div class="menu-dots" onclick="event.stopPropagation();openLeaveModal('${w.rc}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>`;
            return`<div class="worker-card" onclick="selectWorker('${w.rc}')">${md}<div style="display:flex;gap:12px;align-items:center;"><div class="avc" style="width:44px;height:44px;font-size:14px;">${ini(w.name)}</div><div><div style="font-weight:700;font-size:15px;color:var(--text);padding-right:28px;">${w.name}</div><div style="font-size:12px;color:var(--muted);">${w.designation} · RC ${w.rc}</div></div></div>${lvB}<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;"><div style="font-size:15px;font-weight:700;">${wos.length} <span style="font-size:10px;color:var(--muted);">Total WOs</span></div><div style="font-size:11px;font-weight:600;color:var(--blue);">${act} Ongoing</div></div></div>`;
        }).join('')+`</div>`;
    }

    // ── Upload ──
    else if(view==="upload") {
        contentHtml=isViewer?`<div style="text-align:center;padding:50px;color:var(--muted);">No permission to view this page.</div>`:`
        <div style="max-width:520px;margin:0 auto;">
            <div class="sec-title" style="text-align:center;">Import / Manage Data</div>
            <div style="text-align:center;color:var(--muted);font-size:13px;line-height:1.6;margin:12px 0 16px;">Select the <strong>Scope Master</strong> Excel file.<br>Only <strong>EEW</strong> records will be imported and saved to Firebase.</div>
            <div style="text-align:center;font-size:13px;margin-bottom:20px;">Last import: <span style="color:var(--blue);font-weight:600;">${lastUpdate}</span></div>
            <div class="upload-zone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)" onclick="document.getElementById('f-in').click()">
                <input id="f-in" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(event)">
                <div style="font-size:46px;margin-bottom:12px;">📂</div>
                <div style="font-size:16px;font-weight:600;margin-bottom:4px;">Click to Browse</div>
                <div style="font-size:12px;color:var(--muted);">Or drag and drop your Excel file here</div>
            </div>
            <div style="margin-top:28px;padding-top:22px;border-top:1px dashed var(--border);">
                <button class="btn" style="background:var(--red);color:#fff;width:100%;padding:14px;font-size:14px;justify-content:center;" onclick="clearDatabase()">🗑️ Clear Entire Database</button>
            </div>
        </div>`;
    }

    // ── Leave Modal ──
    if(leaveModalWorker&&view==="workers") {
        const w=WORKERS.find(x=>x.rc===leaveModalWorker);
        const lv=workerLeaves[w.rc]||{type:'None',from:'',to:''};
        const sd=(lv.type&&lv.type!=='None')?'flex':'none';
        const ft=isViewer?`<button class="btn btn-ghost" onclick="closeLeaveModal()">Close</button>`:`<button class="btn btn-ghost" onclick="closeLeaveModal()">Cancel</button><button class="btn btn-primary" onclick="saveLeaveUpdates('${w.rc}')">💾 Save</button>`;
        detailHtml=`<div class="overlay" onclick="if(event.target===this)closeLeaveModal()"><div class="modal" style="max-width:400px;"><div class="modal-head"><div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;">Leave Status</div><button onclick="closeLeaveModal()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div><div class="modal-body"><div style="font-weight:700;font-size:16px;margin-bottom:16px;">${w.name}</div><label class="plbl">Leave Type</label><select id="l-type" class="select" ${dis} style="margin-bottom:14px;" onchange="document.getElementById('l-dates').style.display=this.value==='None'?'none':'flex'"><option value="None" ${lv.type==='None'?'selected':''}>Active (No Leave)</option><option value="Annual Leave" ${lv.type==='Annual Leave'?'selected':''}>Annual Leave</option><option value="Sick Leave" ${lv.type==='Sick Leave'?'selected':''}>Sick Leave</option><option value="FRL" ${lv.type==='FRL'?'selected':''}>FRL</option></select><div id="l-dates" style="display:${sd};flex-direction:column;gap:14px;"><div><label class="plbl">From</label><input type="date" id="l-from" class="input" ${dis} value="${lv.from||''}"></div><div><label class="plbl">To</label><input type="date" id="l-to" class="input" ${dis} value="${lv.to||''}"></div></div></div><div class="modal-foot">${ft}</div></div></div>`;
    }

    // ── Worker Profile Modal ──
    if(selectedWorker&&!leaveModalWorker&&view==="workers") {
        const w=WORKERS.find(x=>x.rc===selectedWorker);
        const wos=orders.filter(o=>o.assignees?.includes(w.rc));
        const act=wos.filter(o=>o.tasks.some(t=>t.status==="Ongoing")).length;
        const wh=wos.length===0?`<div style="font-size:13px;color:var(--muted);text-align:center;padding:18px;background:var(--bg);border-radius:8px;">No assigned work orders.</div>`:`<div style="display:grid;gap:8px;">`+wos.map(o=>`<div style="background:var(--bg);border:1px solid var(--border);padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="openWOFromWorker('${o.id}')"><div><div style="font-weight:700;">${o.id}</div><div style="font-size:11px;color:var(--muted);">${o.asset}</div></div><div style="text-align:right;">${PTagHTML(o.priority)}<div style="font-size:11px;font-weight:700;margin-top:4px;">${o.overallProgress}%</div></div></div>`).join('')+`</div>`;
        detailHtml=`<div class="overlay" onclick="if(event.target===this)closeWorkerModal()"><div class="modal" style="max-width:500px;"><div class="modal-head"><div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;">Employee Profile</div><button onclick="closeWorkerModal()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div><div class="modal-body"><div style="display:flex;align-items:center;gap:15px;margin-bottom:22px;"><div class="avc" style="width:56px;height:56px;font-size:18px;">${ini(w.name)}</div><div><div style="font-weight:700;font-size:20px;">${w.name}</div><div style="font-size:13px;color:var(--blue);font-weight:600;">${w.designation}</div></div></div><div class="d-meta" style="grid-template-columns:1fr;"><div style="display:flex;justify-content:space-between;"><span>RC Number</span><span>${w.rc}</span></div><div style="display:flex;justify-content:space-between;"><span>Phone</span><span>${w.phone||'—'}</span></div><div style="display:flex;justify-content:space-between;"><span>Email</span><span>${w.email||'—'}</span></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><label class="plbl" style="margin:0;">Assigned WOs (${wos.length})</label><span style="font-size:11px;font-weight:600;color:var(--blue);">${act} Ongoing</span></div>${wh}</div></div></div>`;
    }

    // ── WO Detail Modal ──
    if(selectedWO&&(view==="orders"||view==="completed")) {
        const wo=orders.find(o=>o.id===selectedWO);
        if(wo) {
            const tags=wo.assignees.map(rc=>{const w=WORKERS.find(x=>x.rc===rc);const rb=isViewer?'':`<span class="atag-x" onclick="removeAssignee('${rc}')">✕</span>`;return`<div class="atag">${w?w.name.split(" ")[0]:rc} ${rb}</div>`;}).join('');
            const ft=isViewer?`<button class="btn btn-ghost" onclick="selectOrder(null)">Close</button>`:`<button class="btn btn-ghost" onclick="selectOrder(null)">Cancel</button><button class="btn btn-primary" style="padding:10px 30px;" onclick="saveWOUpdates('${wo.id}')">💾 Save</button>`;
            detailHtml=`<div class="overlay" onclick="if(event.target===this)selectOrder(null)"><div class="modal"><div class="modal-head"><div style="font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;">${wo.id}</div><button onclick="selectOrder(null)" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div><div class="modal-body">
            <div class="d-meta"><div>Asset: <span>${wo.asset}</span></div><div>Date: <span>${formatDateNice(wo.date)}</span></div><div>SR No: <span>${wo.sr||'—'}</span></div><div>SVO No: <span>${wo.svo||'—'}</span></div></div>
            <div style="margin-bottom:22px;"><label class="plbl">WO Priority</label><select id="wo-priority" class="select" ${dis}><option value="Minor" ${wo.priority==="Minor"?'selected':''}>Minor</option><option value="Major" ${wo.priority==="Major"?'selected':''}>Major</option><option value="Urgent" ${wo.priority==="Urgent"?'selected':''}>Urgent</option><option value="Critical" ${wo.priority==="Critical"?'selected':''}>Critical</option></select></div>
            <div class="assign-wrap"><label class="plbl">Assigned Team</label>${!isViewer?`<select class="select" onchange="addAssignee(this.value);this.value='';" style="margin-bottom:10px;"><option value="">+ Assign employee...</option>${WORKERS.filter(w=>!wo.assignees.includes(w.rc)).map(w=>`<option value="${w.rc}">${w.name} (${w.designation})</option>`).join('')}</select>`:''}<div class="assign-tags">${tags}</div></div>
            <div><label class="plbl">Tasks (${wo.tasks.length})</label>${wo.tasks.length===0?'<div style="font-size:12px;color:var(--muted);">No tasks for this WO.</div>':''}
            ${wo.tasks.map((t,i)=>`<div class="task-card"><div class="task-head">${t.taskNo}: ${t.details}</div><div class="task-body"><div><label class="plbl">Status</label><select id="t-stat-${i}" class="select" ${dis}><option ${t.status==="Pending"?'selected':''}>Pending</option><option ${t.status==="Ongoing"?'selected':''}>Ongoing</option><option ${t.status==="Onhold"?'selected':''}>Onhold</option><option ${t.status==="Completed"?'selected':''}>Completed</option><option ${t.status==="Cancelled"?'selected':''}>Cancelled</option></select></div><div><label class="plbl">Progress %</label><input type="number" id="t-prog-${i}" class="input" ${dis} value="${t.progress}" min="0" max="100"></div><div><label class="plbl">Start Date</label><input type="date" id="t-start-${i}" class="input" ${dis} value="${t.startDate}">${t.startDate?`<div style="font-size:10px;color:var(--muted);margin-top:3px;">${formatDateNice(t.startDate)}</div>`:''}</div><div><label class="plbl">Complete Date</label><input type="date" id="t-end-${i}" class="input" ${dis} value="${t.completeDate}">${t.completeDate?`<div style="font-size:10px;color:var(--muted);margin-top:3px;">${formatDateNice(t.completeDate)}</div>`:''}</div><div class="task-full"><label class="plbl">Remarks</label><input type="text" id="t-rem-${i}" class="input" ${dis} value="${t.remarks}" placeholder="Notes..."></div></div></div>`).join('')}
            </div></div><div class="modal-foot">${ft}</div></div></div>`;
        }
    }

    root.innerHTML=`<div class="app"><div class="sidebar-overlay ${isSidebarOpen?'show':''}" onclick="toggleSidebar()"></div>${getSidebarHTML()}<div class="main"><div class="topbar"><div style="display:flex;align-items:center;"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div class="page-title">${pageLabels[view]||""}</div></div>${topbarExtra}</div><div class="body-wrap"><div class="content">${contentHtml}</div>${detailHtml}</div></div></div>`;
}

// ── Init: check if user already signed in ─────────────────────────
auth.onAuthStateChanged(async user => {
    if(user) {
        const profile = USER_ROLES[user.email];
        if(profile) {
            currentUser=profile; loggedIn=true; view="dashboard";
            showLoad("Loading your data...");
            try { await dbLoadAll(); } catch(e) { console.error(e); }
            hideLoad(); renderApp();
            startRealtimeSync();
            db.ref(`ees_presence/${currentUser.rc}`).set(Date.now());
            db.ref(`ees_presence/${currentUser.rc}`).onDisconnect().set(0);
        } else {
            hideLoad(); renderApp();
        }
    } else {
        hideLoad(); renderApp();
    }
});
</script>
</body>

// ── Date helpers ──────────────────────────────────────────────────
function formatForInput(val) {
    if(!val || String(val).trim()===""||String(val).trim()==="-") return "";
    let s=String(val).trim(), y,m,d;
    try {
        if(s.includes('/')) { let p=s.split('/'); if(p.length===3){d=+p[0];m=+p[1];y=+p[2];if(m>12&&d<=12){let t=d;d=m;m=t;}if(y<100)y+=2000;} }
        else if(s.includes('-')) { let p=s.split('-'); if(p.length===3){if(p[0].length===4){y=+p[0];m=+p[1];d=+p[2];}else{d=+p[0];y=+p[2];if(y<100)y+=2000;const mn=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];m=mn.findIndex(x=>p[1].toUpperCase().includes(x))+1;if(m===0)m=+p[1];}}}
        else if(!isNaN(parseFloat(s))&&parseFloat(s)>20000){let o=new Date(Math.round((parseFloat(s)-25569)*86400*1000));y=o.getUTCFullYear();m=o.getUTCMonth()+1;d=o.getUTCDate();}
        else{let o=new Date(s);if(!isNaN(o.getTime())){y=o.getFullYear();m=o.getMonth()+1;d=o.getDate();}}
        if(y&&m&&d&&y>=2000&&y<=2100) return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    } catch(e) {}
    return "";
}

function formatDateNice(ds) {
    if(!ds||ds.includes("1970")||ds.includes("1899")) return "-";
    const p=ds.split('-'); if(p.length!==3) return ds;
    const y=+p[0],mo=+p[1]-1,d=+p[2]; if(y<2000) return "-";
    const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const sx=["th","st","nd","rd"][(d%10>3||Math.floor(d%100/10)===1)?0:d%10];
    return `${d}${sx} ${mn[mo]} ${y}`;
}

        updates[`ees_wo/${wo.id}`] = {
            id: wo.id, asset: wo.asset, date: wo.date, sr: wo.sr||"",
            svo: wo.svo||"", priority: wo.priority,
            overallProgress: wo.overallProgress,
            assignees: wo.assignees||[],
            tasks: wo.tasks||[]
        };
    });
    await db.ref().update(updates);
}

// Save leave for one worker
async function dbSaveLeave(rc, data) {
    if(!data || data.type==='None') {
        await db.ref(`ees_leaves/${rc}`).remove();
    } else {
        await db.ref(`ees_leaves/${rc}`).set({ type: data.type, from: data.from||"", to: data.to||"" });
    }
}

// Save last import timestamp
async function dbSaveLastUpdate(ts) {
    await db.ref('ees_meta/lastUpdate').set(ts);
}

// Load all data from Firebase once
async function dbLoadAll() {
    const [woSnap, leavesSnap, metaSnap] = await Promise.all([
        db.ref('ees_wo').once('value'),
        db.ref('ees_leaves').once('value'),
        db.ref('ees_meta').once('value')
    ]);

    const woData = woSnap.val() || {};
    orders = Object.values(woData).map(wo => ({
        id: wo.id||"",
        asset: wo.asset||"",
        date: wo.date||"",
        sr: wo.sr||"",
        svo: wo.svo||"",
        priority: wo.priority||"Minor",
        overallProgress: wo.overallProgress||0,
        assignees: Array.isArray(wo.assignees) ? wo.assignees : [],
        tasks: Array.isArray(wo.tasks) ? wo.tasks : []
    }));

    const lvData = leavesSnap.val() || {};
    workerLeaves = {};
    Object.entries(lvData).forEach(([rc, lv]) => {
        if(lv && lv.type && lv.type !== 'None') workerLeaves[rc] = lv;
    });

    const meta = metaSnap.val() || {};
    lastUpdate = meta.lastUpdate || "Never";
}

// ── Real-time listener: auto-refresh when any device changes data ──
function startRealtimeSync() {
    stopRealtimeSync();

    const woRef = db.ref('ees_wo');
    const handler = woRef.on('value', snap => {
        if(!loggedIn) return;
        const data = snap.val() || {};
        orders = Object.values(data).map(wo => ({
            id: wo.id||"", asset: wo.asset||"", date: wo.date||"",
            sr: wo.sr||"", svo: wo.svo||"",
            priority: wo.priority||"Minor",
            overallProgress: wo.overallProgress||0,
            assignees: Array.isArray(wo.assignees) ? wo.assignees : [],
            tasks: Array.isArray(wo.tasks) ? wo.tasks : []
        }));
        renderApp();
    });
    realtimeListeners.push({ ref: woRef, handler });

    const lvRef = db.ref('ees_leaves');
    const lvHandler = lvRef.on('value', snap => {
        if(!loggedIn) return;
        const data = snap.val() || {};
        workerLeaves = {};
        Object.entries(data).forEach(([rc, lv]) => {
            if(lv && lv.type && lv.type !== 'None') workerLeaves[rc] = lv;
        });
        renderApp();
    });
    realtimeListeners.push({ ref: lvRef, handler: lvHandler });
}

function stopRealtimeSync() {
    realtimeListeners.forEach(({ ref, handler }) => ref.off('value', handler));
    realtimeListeners = [];
}

    if(!email||!pass) { loginErr="Please enter email and password."; renderApp(); return; }

    showLoad("Signing in...");

        currentUser = profile;
        loggedIn = true;
        loginErr = "";
        view = "dashboard";

        showLoad("Loading data...");
        await dbLoadAll();
        hideLoad();
        renderApp();
        startRealtimeSync();

        // Update online presence
        db.ref(`ees_presence/${currentUser.rc}`).set(Date.now());
        db.ref(`ees_presence/${currentUser.rc}`).onDisconnect().set(0);

    } catch(e) {
        hideLoad();
        if(e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
            loginErr = "Wrong email or password.";

        }
        renderApp();
    }
};

window.processExcel = async function(file) {
    if(!window.XLSX){showToast("⏳ Library loading...");return;}
    const reader=new FileReader();
    reader.onload=async(e)=>{
        showLoad("Reading Excel file...");
        try {
            const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
            const ws=wb.Sheets[wb.SheetNames[0]];
            let rows=XLSX.utils.sheet_to_json(ws,{defval:""});
            if(rows.length>0&&!("WO NUMBER" in rows[0])&&!("WO ID" in rows[0]))
                rows=XLSX.utils.sheet_to_json(ws,{range:4,defval:""});
            if(!rows.length){hideLoad();showToast("⚠️ No data found.");return;}

            const hd=Object.keys(rows[0]||{});
            const sk  = hd.find(k=>k.trim().toUpperCase().includes('START DATE'))    || "START DATE";
            const pk  = hd.find(k=>k.trim().toUpperCase().includes('PROGRESS'))      || " PROGRESS\n%";
            const stk = hd.find(k=>k.trim().toUpperCase()==='STATUS')                || "STATUS";
            const ck  = hd.find(k=>k.trim().toUpperCase()==='COMPLETED DATE')        || "COMPLETED DATE";
            const rk  = hd.find(k=>k.trim().toUpperCase().includes('REMARKS'))       || "WORKSHOPS REMARKS";
            const dk  = hd.find(k=>k.trim().toUpperCase().includes('CAPTAL')||k.trim().toUpperCase()==='TASK DETAILS') || "TASK DETAILS";

            const eew = rows.filter(r=>String(r["UNIT"]||"").trim().toUpperCase()==="EEW"||String(r["WO NUMBER"]||"").trim().toUpperCase().includes("-EEW"));
            if(!eew.length){hideLoad();showToast("⚠️ No EEW records found.");return;}

            let added=0, updated=0;
            const changed=new Map();

            eew.forEach(r=>{
                const wid=String(r["WO NUMBER"]||r["WO ID"]).trim();
                if(!wid||wid==="0")return;
                const ed=formatForInput(r["TASK DATE"])||formatForInput(r[sk])||"";
                let wo=orders.find(o=>o.id===wid);
                if(!wo){wo={id:wid,sr:String(r["SR NUMBER"]||"").trim(),svo:String(r["SVO NUMBER"]||"").trim(),asset:String(r["ASSET/SERVICE NAME"]||"TBA").trim(),date:ed,priority:"Minor",overallProgress:0,assignees:[],tasks:[]};orders.push(wo);}
                else if(isBadDate(wo.date)&&ed)wo.date=ed;

                const tn=String(r["TASK NO:"]||`Task-${wo.tasks.length+1}`).trim();
                const es=formatForInput(r[sk]),ee=formatForInput(r[ck]);
                const edet=String(r[dk]||r["TASK DETAILS"]||"").trim();
                const er=String(r[rk]||"").trim();

                let pv=r[pk],pn=0;
                if(typeof pv==='number')pn=pv;else if(typeof pv==='string')pn=parseFloat(pv.replace("%",""))||0;
                if(pn>0&&pn<=1)pn*=100;
                pn=Math.round(Math.min(100,Math.max(0,pn)));

                let rawSt=String(r[stk]||"Pending").trim().toLowerCase(), st="Pending";
                if(rawSt.includes("hold")||rawSt.includes("material")||rawSt.includes("delay"))st="Onhold";
                else if(rawSt.includes("ongo")||rawSt.includes("on-go")||rawSt.includes("progress"))st="Ongoing";
                else if(rawSt.includes("comp"))st="Completed";
                else if(rawSt.includes("canc"))st="Cancelled";

                const tx=wo.tasks.find(t=>t.taskNo===tn);
                if(!tx){wo.tasks.push({taskNo:tn,details:edet,status:st,startDate:es,progress:pn,completeDate:ee,remarks:er});added++;changed.set(wo.id,wo);}
                else{let c=false;if(es&&(isBadDate(tx.startDate)||tx.startDate!==es)){tx.startDate=es;c=true;}if(ee&&(isBadDate(tx.completeDate)||tx.completeDate!==ee)){tx.completeDate=ee;c=true;}if(edet&&tx.details!==edet){tx.details=edet;c=true;}if(r[stk]&&tx.status!==st){tx.status=st;c=true;}if(r[pk]!==undefined&&r[pk]!==""&&tx.progress!==pn){tx.progress=pn;c=true;}if(er&&tx.remarks!==er){tx.remarks=er;c=true;}if(c){updated++;changed.set(wo.id,wo);}}
            });

            changed.forEach(wo=>{if(wo.tasks.length){let tp=0;wo.tasks.forEach(t=>tp+=t.progress);wo.overallProgress=Math.round(tp/wo.tasks.length);}});

            if(changed.size>0){
                showLoad(`Saving ${changed.size} work orders to Firebase...`);
                await dbBatchSave([...changed.values()]);
                lastUpdate=new Date().toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"});
                await dbSaveLastUpdate(lastUpdate);
                showToast(`✅ Added ${added} new tasks, updated ${updated} existing`);
                setView('orders');
            } else {
                showToast("⚠️ No changes — database already up to date.");
            }
        } catch(err) {
            console.error(err);
            showToast("❌ Error: "+err.message, true);
        }
        hideLoad(); renderApp();
    };
    reader.readAsArrayBuffer(file);
};

        onlineHtml=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span style="color:var(--text);font-weight:600;">Ahmed Miushaan</span><span id="viewer-status"><span style="color:var(--red);font-weight:600;">🔴 Offline</span></span></div>`;
    }
    return `
    <aside class="sidebar ${isSidebarOpen?'show':''}">
        <div class="logo">
            <div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px;line-height:1.2;margin-top:10px;margin-bottom:5px;">EES WO CONTROL<br>DATABASE</div>
        </div>
        <div class="nav-grp"><div class="nav-grp-lbl">Main</div>
            <div class="nav-item ${view==='dashboard'?'active':''}" onclick="setView('dashboard')"><span>📊</span> Dashboard</div>
            <div class="nav-item ${view==='orders'?'active':''}" onclick="setView('orders')"><span>📋</span> Active Orders</div>
            <div class="nav-item ${view==='completed'?'active':''}" onclick="setView('completed')"><span>✅</span> WO Completed</div>
        </div>
        <div class="nav-grp"><div class="nav-grp-lbl">Team</div>
            <div class="nav-item ${view==='workers'?'active':''}" onclick="setView('workers')"><span>👷</span> EES Team</div>
        </div>
        <div class="nav-grp"><div class="nav-grp-lbl">Reports & Data</div>
            ${!iv?`<div class="nav-item ${view==='upload'?'active':''}" onclick="setView('upload')"><span>⬆️</span> Manage Data</div>`:''}
            <div class="nav-item" onclick="exportExcel()"><span>⬇️</span> Export Excel</div>
        </div>
        <div class="sidebar-foot">
            ${onlineHtml}
            <div class="user-card">
                <div class="avc">${ini(currentUser.name)}</div>
                <div><div class="user-name">${currentUser.name}</div><div class="user-role">${currentUser.designation}</div></div>
            </div>
            <div class="theme-row">
                <span style="font-size:12px;color:var(--muted);font-weight:600;">Light Mode</span>
                <label class="switch"><input type="checkbox" onchange="toggleTheme()" ${isLightMode?'checked':''}><span class="slider"></span></label>
            </div>
            <div class="logout-text" onclick="handleLogout()">Logout</div>
        </div>
    </aside>`;
}

// ── Main render ───────────────────────────────────────────────────

function renderApp() {
    const root = document.getElementById("app-root");

    if(!loggedIn) {
        root.innerHTML=`<div class="login-wrap"><div class="login-card">
            <div class="login-title">EES WO CONTROL DATABASE</div>
            <div class="login-subtitle">MTCC</div>
            <div class="login-inp-group">
                <label class="login-lbl">Email / Username</label>
                <input id="login-u" class="login-inp" type="text" placeholder="Enter username or email" onkeydown="if(event.key==='Enter')handleLogin()">
                <label class="login-lbl">Password</label>
                <div class="pwd-container">
                    <input id="login-p" class="login-inp" type="password" placeholder="Enter password" style="padding-right:40px" onkeydown="if(event.key==='Enter')handleLogin()">
                    <div class="pwd-toggle" onclick="togglePassword()">
                        <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" stroke="var(--muted)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </div>
                </div>
                ${loginErr?`<div class="login-err">⚠ ${loginErr}</div>`:''}
            </div>
            <button class="login-btn" onclick="handleLogin()">Sign In →</button>
        </div></div>`;
        return;
    }

    // Update presence ping
    if(currentUser) db.ref(`ees_presence/${currentUser.rc}`).set(Date.now());

    const isViewer = currentUser?.role==='viewer';
    const dis = isViewer?'disabled':'';
    let contentHtml="", detailHtml="", topbarExtra="";

    // ── Dashboard ──
    if(view==="dashboard") {
        let onLeave=0; WORKERS.forEach(w=>{if(workerLeaves[w.rc]?.type&&workerLeaves[w.rc].type!=='None')onLeave++;});
        const uc=orders.filter(o=>(o.priority==="Urgent"||o.priority==="Critical")&&o.overallProgress<100);
        const og=orders.filter(o=>o.tasks.some(t=>t.status==="Ongoing")&&o.overallProgress<100);
        let tT=0,tOn=0,tOh=0,tP=0,tC=0,tCn=0;
        orders.forEach(o=>o.tasks.forEach(t=>{tT++;if(t.status==="Ongoing")tOn++;if(t.status==="Onhold")tOh++;if(t.status==="Pending")tP++;if(t.status==="Completed")tC++;if(t.status==="Cancelled")tCn++;}));
        topbarExtra=`<button class="btn" style="background:var(--red);color:#fff;font-weight:700;" onclick="exportDashboardPDF()">📄 REPORT</button>`;
        contentHtml=`
        <div id="dashboard-content" style="display:flex;flex-direction:column;gap:30px;padding-bottom:20px;">
            <div><div class="sec-title">EES MANPOWER</div><div class="task-stats">
                <div class="ts-item"><div class="ts-val">${WORKERS.length}</div><div class="ts-lbl">Headcount</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--blue)">${WORKERS.length-onLeave}</div><div class="ts-lbl">On Duty</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--red)">${onLeave}</div><div class="ts-lbl">On Leave</div></div>
            </div></div>
            <div><div class="sec-title">Tasks Status</div><div class="task-stats">
                <div class="ts-item"><div class="ts-val">${tT}</div><div class="ts-lbl">Total</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--blue)">${tOn}</div><div class="ts-lbl">Ongoing</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--orange)">${tOh}</div><div class="ts-lbl">Onhold</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--muted)">${tP}</div><div class="ts-lbl">Pending</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--green)">${tC}</div><div class="ts-lbl">Completed</div></div>
                <div class="ts-item"><div class="ts-val" style="color:var(--red)">${tCn}</div><div class="ts-lbl">Cancelled</div></div>
            </div></div>
            <div><div class="sec-title" style="color:var(--red);">🚨 Urgent & Critical Active WOs</div><div class="wo-list">
                ${uc.length===0?`<div style="padding:18px;color:var(--muted);background:var(--card);border-radius:8px;">No Urgent/Critical items.</div>`:''}
                ${uc.map(o=>`<div class="wo-card" style="border-left-color:${PRI_CFG[o.priority].color}" onclick="selectOrder('${o.id}');setView('orders')"><div class="wo-col left"><div class="wo-id">${o.id}</div><div class="wo-asset">${o.asset}</div></div><div class="wo-col center"><div class="wo-date">${formatDateNice(o.date)}</div><div class="wo-tasks">${o.tasks.length} Tasks</div></div><div class="wo-col right">${PTagHTML(o.priority)}<div class="wo-prog">Prog: ${o.overallProgress}%</div></div></div>`).join('')}
            </div></div>
            <div><div class="sec-title" style="color:var(--green);">🟢 Ongoing Active WOs</div><div class="wo-list">
                ${og.length===0?`<div style="padding:18px;color:var(--muted);background:var(--card);border-radius:8px;">No Ongoing items.</div>`:''}
                ${og.map(o=>`<div class="wo-card ongoing-glow" onclick="selectOrder('${o.id}');setView('orders')"><div class="wo-col left"><div class="wo-id">${o.id}</div><div class="wo-asset">${o.asset}</div></div><div class="wo-col center"><div class="wo-date">${formatDateNice(o.date)}</div><div class="wo-tasks">${o.tasks.length} Tasks</div></div><div class="wo-col right">${PTagHTML(o.priority)}<div class="wo-prog">Prog: ${o.overallProgress}%</div></div></div>`).join('')}
            </div></div>
        </div>`;
    }

    // ── Orders / Completed ──
    else if(view==="orders"||view==="completed") {
        const isc=(view==="completed");
        const base=orders.filter(o=>isc?o.overallProgress===100:o.overallProgress<100);
        const assets=Array.from(new Set(base.map(o=>o.asset))).filter(Boolean).sort();
        const fil=base.filter(o=>filterAsset==="All"||o.asset===filterAsset);
        contentHtml=`
        <div style="margin-bottom:20px;"><label style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:block;font-weight:600;">Filter by Asset</label>
        <select class="filter-dropdown" onchange="setFilter(this.value)"><option value="All" ${filterAsset==="All"?"selected":""}>All Assets</option>${assets.map(a=>`<option value="${a}" ${filterAsset===a?"selected":""}>${a}</option>`).join('')}</select></div>
        <div class="wo-list">${fil.length===0?`<div style="text-align:center;color:var(--muted);padding:40px;">No ${isc?'completed':'active'} work orders.</div>`:''}
        ${fil.map(o=>{const on=o.tasks.some(t=>t.status==="Ongoing");return`<div class="wo-card ${on&&!isc?'ongoing-glow':''}" style="${!on||isc?`border-left-color:${PRI_CFG[o.priority].color}`:''}" onclick="selectOrder('${o.id}')"><div class="wo-col left"><div class="wo-id">${o.id}</div><div class="wo-asset">${o.asset}</div></div><div class="wo-col center"><div class="wo-date">${formatDateNice(o.date)}</div><div class="wo-tasks">${o.tasks.length} Tasks</div></div><div class="wo-col right">${PTagHTML(o.priority)}<div class="wo-prog" style="${isc?'color:var(--green)':''}">${o.overallProgress}%</div></div></div>`;}).join('')}</div>`;
    }

    // ── Workers ──
    else if(view==="workers") {
        contentHtml=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;">`+
        WORKERS.map(w=>{
            const wos=orders.filter(o=>o.assignees?.includes(w.rc));
            const act=wos.filter(o=>o.tasks.some(t=>t.status==="Ongoing")).length;
            const lv=workerLeaves[w.rc];
            const lvB=lv&&lv.type!=='None'?`<div style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;margin-top:8px;display:inline-block;">🔴 ${lv.type}${lv.from&&lv.to?` (${formatDateNice(lv.from)} – ${formatDateNice(lv.to)})`:''}</div>`:'';
            const md=isViewer?'':`<div class="menu-dots" onclick="event.stopPropagation();openLeaveModal('${w.rc}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>`;
            return`<div class="worker-card" onclick="selectWorker('${w.rc}')">${md}<div style="display:flex;gap:12px;align-items:center;"><div class="avc" style="width:44px;height:44px;font-size:14px;">${ini(w.name)}</div><div><div style="font-weight:700;font-size:15px;color:var(--text);padding-right:28px;">${w.name}</div><div style="font-size:12px;color:var(--muted);">${w.designation} · RC ${w.rc}</div></div></div>${lvB}<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;"><div style="font-size:15px;font-weight:700;">${wos.length} <span style="font-size:10px;color:var(--muted);">Total WOs</span></div><div style="font-size:11px;font-weight:600;color:var(--blue);">${act} Ongoing</div></div></div>`;
        }).join('')+`</div>`;
    }

    // ── Upload ──
    else if(view==="upload") {
        contentHtml=isViewer?`<div style="text-align:center;padding:50px;color:var(--muted);">No permission to view this page.</div>`:`
        <div style="max-width:520px;margin:0 auto;">
            <div class="sec-title" style="text-align:center;">Import / Manage Data</div>
            <div style="text-align:center;color:var(--muted);font-size:13px;line-height:1.6;margin:12px 0 16px;">Select the <strong>Scope Master</strong> Excel file.<br>Only <strong>EEW</strong> records will be imported and saved to Firebase.</div>
            <div style="text-align:center;font-size:13px;margin-bottom:20px;">Last import: <span style="color:var(--blue);font-weight:600;">${lastUpdate}</span></div>
            <div class="upload-zone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)" onclick="document.getElementById('f-in').click()">
                <input id="f-in" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(event)">
                <div style="font-size:46px;margin-bottom:12px;">📂</div>
                <div style="font-size:16px;font-weight:600;margin-bottom:4px;">Click to Browse</div>
                <div style="font-size:12px;color:var(--muted);">Or drag and drop your Excel file here</div>
            </div>
            <div style="margin-top:28px;padding-top:22px;border-top:1px dashed var(--border);">
                <button class="btn" style="background:var(--red);color:#fff;width:100%;padding:14px;font-size:14px;justify-content:center;" onclick="clearDatabase()">🗑️ Clear Entire Database</button>
            </div>
        </div>`;
    }

    // ── Leave Modal ──
    if(leaveModalWorker&&view==="workers") {
        const w=WORKERS.find(x=>x.rc===leaveModalWorker);
        const lv=workerLeaves[w.rc]||{type:'None',from:'',to:''};
        const sd=(lv.type&&lv.type!=='None')?'flex':'none';
        const ft=isViewer?`<button class="btn btn-ghost" onclick="closeLeaveModal()">Close</button>`:`<button class="btn btn-ghost" onclick="closeLeaveModal()">Cancel</button><button class="btn btn-primary" onclick="saveLeaveUpdates('${w.rc}')">💾 Save</button>`;
        detailHtml=`<div class="overlay" onclick="if(event.target===this)closeLeaveModal()"><div class="modal" style="max-width:400px;"><div class="modal-head"><div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;">Leave Status</div><button onclick="closeLeaveModal()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div><div class="modal-body"><div style="font-weight:700;font-size:16px;margin-bottom:16px;">${w.name}</div><label class="plbl">Leave Type</label><select id="l-type" class="select" ${dis} style="margin-bottom:14px;" onchange="document.getElementById('l-dates').style.display=this.value==='None'?'none':'flex'"><option value="None" ${lv.type==='None'?'selected':''}>Active (No Leave)</option><option value="Annual Leave" ${lv.type==='Annual Leave'?'selected':''}>Annual Leave</option><option value="Sick Leave" ${lv.type==='Sick Leave'?'selected':''}>Sick Leave</option><option value="FRL" ${lv.type==='FRL'?'selected':''}>FRL</option></select><div id="l-dates" style="display:${sd};flex-direction:column;gap:14px;"><div><label class="plbl">From</label><input type="date" id="l-from" class="input" ${dis} value="${lv.from||''}"></div><div><label class="plbl">To</label><input type="date" id="l-to" class="input" ${dis} value="${lv.to||''}"></div></div></div><div class="modal-foot">${ft}</div></div></div>`;
    }

    // ── Worker Profile Modal ──
    if(selectedWorker&&!leaveModalWorker&&view==="workers") {
        const w=WORKERS.find(x=>x.rc===selectedWorker);
        const wos=orders.filter(o=>o.assignees?.includes(w.rc));
        const act=wos.filter(o=>o.tasks.some(t=>t.status==="Ongoing")).length;
        const wh=wos.length===0?`<div style="font-size:13px;color:var(--muted);text-align:center;padding:18px;background:var(--bg);border-radius:8px;">No assigned work orders.</div>`:`<div style="display:grid;gap:8px;">`+wos.map(o=>`<div style="background:var(--bg);border:1px solid var(--border);padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="openWOFromWorker('${o.id}')"><div><div style="font-weight:700;">${o.id}</div><div style="font-size:11px;color:var(--muted);">${o.asset}</div></div><div style="text-align:right;">${PTagHTML(o.priority)}<div style="font-size:11px;font-weight:700;margin-top:4px;">${o.overallProgress}%</div></div></div>`).join('')+`</div>`;
        detailHtml=`<div class="overlay" onclick="if(event.target===this)closeWorkerModal()"><div class="modal" style="max-width:500px;"><div class="modal-head"><div style="font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;">Employee Profile</div><button onclick="closeWorkerModal()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div><div class="modal-body"><div style="display:flex;align-items:center;gap:15px;margin-bottom:22px;"><div class="avc" style="width:56px;height:56px;font-size:18px;">${ini(w.name)}</div><div><div style="font-weight:700;font-size:20px;">${w.name}</div><div style="font-size:13px;color:var(--blue);font-weight:600;">${w.designation}</div></div></div><div class="d-meta" style="grid-template-columns:1fr;"><div style="display:flex;justify-content:space-between;"><span>RC Number</span><span>${w.rc}</span></div><div style="display:flex;justify-content:space-between;"><span>Phone</span><span>${w.phone||'—'}</span></div><div style="display:flex;justify-content:space-between;"><span>Email</span><span>${w.email||'—'}</span></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><label class="plbl" style="margin:0;">Assigned WOs (${wos.length})</label><span style="font-size:11px;font-weight:600;color:var(--blue);">${act} Ongoing</span></div>${wh}</div></div></div>`;
    }

    // ── WO Detail Modal ──
    if(selectedWO&&(view==="orders"||view==="completed")) {
        const wo=orders.find(o=>o.id===selectedWO);
        if(wo) {
            const tags=wo.assignees.map(rc=>{const w=WORKERS.find(x=>x.rc===rc);const rb=isViewer?'':`<span class="atag-x" onclick="removeAssignee('${rc}')">✕</span>`;return`<div class="atag">${w?w.name.split(" ")[0]:rc} ${rb}</div>`;}).join('');
            const ft=isViewer?`<button class="btn btn-ghost" onclick="selectOrder(null)">Close</button>`:`<button class="btn btn-ghost" onclick="selectOrder(null)">Cancel</button><button class="btn btn-primary" style="padding:10px 30px;" onclick="saveWOUpdates('${wo.id}')">💾 Save</button>`;
            detailHtml=`<div class="overlay" onclick="if(event.target===this)selectOrder(null)"><div class="modal"><div class="modal-head"><div style="font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;">${wo.id}</div><button onclick="selectOrder(null)" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div><div class="modal-body">
            <div class="d-meta"><div>Asset: <span>${wo.asset}</span></div><div>Date: <span>${formatDateNice(wo.date)}</span></div><div>SR No: <span>${wo.sr||'—'}</span></div><div>SVO No: <span>${wo.svo||'—'}</span></div></div>
            <div style="margin-bottom:22px;"><label class="plbl">WO Priority</label><select id="wo-priority" class="select" ${dis}><option value="Minor" ${wo.priority==="Minor"?'selected':''}>Minor</option><option value="Major" ${wo.priority==="Major"?'selected':''}>Major</option><option value="Urgent" ${wo.priority==="Urgent"?'selected':''}>Urgent</option><option value="Critical" ${wo.priority==="Critical"?'selected':''}>Critical</option></select></div>
            <div class="assign-wrap"><label class="plbl">Assigned Team</label>${!isViewer?`<select class="select" onchange="addAssignee(this.value);this.value='';" style="margin-bottom:10px;"><option value="">+ Assign employee...</option>${WORKERS.filter(w=>!wo.assignees.includes(w.rc)).map(w=>`<option value="${w.rc}">${w.name} (${w.designation})</option>`).join('')}</select>`:''}<div class="assign-tags">${tags}</div></div>
            <div><label class="plbl">Tasks (${wo.tasks.length})</label>${wo.tasks.length===0?'<div style="font-size:12px;color:var(--muted);">No tasks for this WO.</div>':''}
            ${wo.tasks.map((t,i)=>`<div class="task-card"><div class="task-head">${t.taskNo}: ${t.details}</div><div class="task-body"><div><label class="plbl">Status</label><select id="t-stat-${i}" class="select" ${dis}><option ${t.status==="Pending"?'selected':''}>Pending</option><option ${t.status==="Ongoing"?'selected':''}>Ongoing</option><option ${t.status==="Onhold"?'selected':''}>Onhold</option><option ${t.status==="Completed"?'selected':''}>Completed</option><option ${t.status==="Cancelled"?'selected':''}>Cancelled</option></select></div><div><label class="plbl">Progress %</label><input type="number" id="t-prog-${i}" class="input" ${dis} value="${t.progress}" min="0" max="100"></div><div><label class="plbl">Start Date</label><input type="date" id="t-start-${i}" class="input" ${dis} value="${t.startDate}">${t.startDate?`<div style="font-size:10px;color:var(--muted);margin-top:3px;">${formatDateNice(t.startDate)}</div>`:''}</div><div><label class="plbl">Complete Date</label><input type="date" id="t-end-${i}" class="input" ${dis} value="${t.completeDate}">${t.completeDate?`<div style="font-size:10px;color:var(--muted);margin-top:3px;">${formatDateNice(t.completeDate)}</div>`:''}</div><div class="task-full"><label class="plbl">Remarks</label><input type="text" id="t-rem-${i}" class="input" ${dis} value="${t.remarks}" placeholder="Notes..."></div></div></div>`).join('')}
            </div></div><div class="modal-foot">${ft}</div></div></div>`;
        }
    }

    root.innerHTML=`<div class="app"><div class="sidebar-overlay ${isSidebarOpen?'show':''}" onclick="toggleSidebar()"></div>${getSidebarHTML()}<div class="main"><div class="topbar"><div style="display:flex;align-items:center;"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div class="page-title">${pageLabels[view]||""}</div></div>${topbarExtra}</div><div class="body-wrap"><div class="content">${contentHtml}</div>${detailHtml}</div></div></div>`;
}

// ── Init: check if user already signed in ─────────────────────────
auth.onAuthStateChanged(async user => {
    if(user) {
        const profile = USER_ROLES[user.email];
        if(profile) {
            currentUser=profile; loggedIn=true; view="dashboard";
            showLoad("Loading your data...");
            try { await dbLoadAll(); } catch(e) { console.error(e); }
            hideLoad(); renderApp();
            startRealtimeSync();
            db.ref(`ees_presence/${currentUser.rc}`).set(Date.now());
            db.ref(`ees_presence/${currentUser.rc}`).onDisconnect().set(0);
        } else {
            hideLoad(); renderApp();
        }
    } else {
        hideLoad(); renderApp();
    }
});
</script>
</body>
</html>
